<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <title>Rural Microgrid: Smart Billing Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD2nhMhyfPMiVPNWUJ8OkJJIKpg_6Hbyj8",
            authDomain: "solaris-4ca9a.firebaseapp.com",
            databaseURL: "https://solaris-4ca9a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "solaris-4ca9a",
            storageBucket: "solaris-4ca9a.firebasestorage.app",
            messagingSenderId: "959617229391",
            appId: "1:959617229391:web:581117f72c0a40b48cc03a"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // --- GLOBAL STATE ---
        const houseData = {};
        let villageLoadBuffer = [];
        let totalVillageLoad = 0;
        let loadChart = null;

        // Initialize empty objects for houses 101-110
        for (let id = 101; id <= 110; id++) { 
            houseData[id] = { power: 0, actual_kwh: 0, predicted_kwh: 0, status: 1 }; 
        }

        // --- NAVIGATION ---
        window.showDashboardView = () => { 
            document.getElementById('dashboardView').style.display = 'block'; 
            document.getElementById('villageView').style.display = 'none'; 
        };
        window.showVillageView = () => { 
            document.getElementById('dashboardView').style.display = 'none'; 
            document.getElementById('villageView').style.display = 'block'; 
            updateVillageCards(); 
        };

        // --- CHARTS ---
        function initializeCharts() {
            const ctx = document.getElementById('villageLoadChart').getContext('2d');
            loadChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{
                        label: 'Total Grid Load (W)',
                        data: Array(20).fill(0),
                        borderColor: '#00ffff',
                        backgroundColor: 'rgba(0, 255, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.05)' }, 
                            ticks: { color: '#8892b0' } 
                        },
                        // We turn the X-axis display to TRUE and add styling
                        x: { 
                            display: true, 
                            grid: { display: false }, 
                            ticks: { color: '#8892b0', maxTicksLimit: 6 } 
                        }
                    },
                    animation: { duration: 0 }
                }
                    animation: { duration: 0 }
                }
            });
        }

        // --- UI UPDATES ---
        function updateGlobalStats() {
            document.getElementById('totalLoadValue').textContent = totalVillageLoad.toFixed(0);
            let activeCount = 0;
            let totalForecast = 0;
            
            for(let id in houseData) {
                if(houseData[id].status === 0) activeCount++;
                totalForecast += houseData[id].predicted_kwh;
            }
            
            document.getElementById('activeMetersValue').textContent = activeCount;
            document.getElementById('avgForecastValue').textContent = (totalForecast / 10).toFixed(1);
        }

        function updateVillageCards() {
            const container = document.getElementById('villageCardsContainer');
            if (container.innerHTML === "") {
                for (let id = 101; id <= 110; id++) {
                    const card = document.createElement('div');
                    card.className = 'village-card';
                    card.id = `card-${id}`;
                    card.innerHTML = `
                        <div class="village-card-header">
                            <div class="village-card-id">House ${id}</div>
                            <div class="village-card-status" id="status-container-${id}">
                                <span class="status-dot" id="dot-${id}"></span>
                                <span id="status-text-${id}">OFFLINE</span>
                            </div>
                        </div>
                        <div class="village-card-body">
                            <div class="village-metric">
                                <div class="village-metric-label">Billed (Actual)</div>
                                <div class="village-metric-value"><span id="billed-${id}">0.0</span> <span class="unit">kWh</span></div>
                            </div>
                            <div class="village-metric">
                                <div class="village-metric-label">Forecast (30D)</div>
                                <div class="village-metric-value forecast"><span id="forecast-${id}">0.0</span> <span class="unit">kWh</span></div>
                            </div>
                            <div class="slab-badge" id="slab-${id}">SLAB 1</div>
                        </div>`;
                    container.appendChild(card);
                }
            }

            for (let id = 101; id <= 110; id++) {
                const h = houseData[id];
                
                // --- CORRECTED Status Mapping (ESP32 Enum Sync) ---
                // 0 = PENDING, 1 = OK, 2 = OFFLINE, 3 = FAULT
                const statusDot = document.getElementById(`dot-${id}`);
                const statusText = document.getElementById(`status-text-${id}`);
                
                if (h.status === 1) { 
                    statusDot.style.backgroundColor = "#00ff88"; // Green
                    statusText.textContent = "ONLINE"; 
                } 
                else if (h.status === 2) { 
                    statusDot.style.backgroundColor = "#ff3860"; // Red
                    statusText.textContent = "OFFLINE"; 
                } 
                else if (h.status === 3) { 
                    statusDot.style.backgroundColor = "#ffd700"; // Yellow
                    statusText.textContent = "FAULT"; 
                } 
                else { 
                    // Status 0 (NODE_PENDING) or missing data
                    statusDot.style.backgroundColor = "#8892b0"; // Gray
                    statusText.textContent = "WAITING..."; 
                }

                // TANGEDCO Slab Logic
                const billed = h.actual_kwh;
                const forecast = h.predicted_kwh;
                let slab = "SLAB 1 (Free)"; let color = "#00ff88";
                if (billed > 500) { slab = "SLAB 5 (Max)"; color = "#ff3860"; }
                else if (billed > 400) { slab = "SLAB 4"; color = "#ff6b35"; }
                else if (billed > 200) { slab = "SLAB 3"; color = "#ffd700"; }
                else if (billed > 100) { slab = "SLAB 2"; color = "#aacc00"; }

                document.getElementById(`billed-${id}`).textContent = billed.toFixed(2);
                document.getElementById(`forecast-${id}`).textContent = forecast.toFixed(1);
                const slabBadge = document.getElementById(`slab-${id}`);
                slabBadge.textContent = slab;
                slabBadge.style.color = color;

                // Warning Glow if Forecast exceeds current Slab
                if (forecast > (billed + 20)) {
                    document.getElementById(`card-${id}`).style.boxShadow = "0 0 15px rgba(255, 215, 0, 0.2)";
                } else {
                    document.getElementById(`card-${id}`).style.boxShadow = "none";
                }
            }
        }

        // --- FIREBASE LISTENERS ---
        function startListeners() {
            for (let id = 101; id <= 110; id++) {
                const houseRef = ref(database, `houses/${id}`);
                onValue(houseRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // Inside startListeners()...
                        houseData[id] = {
                            power: data.power || 0,
                            actual_kwh: data.actual_kwh || 0,
                            predicted_kwh: data.predicted_kwh || 0,
                            status: data.status ?? 0  // <--- Change this to 0
                        };

                        // Recalculate total grid load
                        totalVillageLoad = 0;
                        for(let i in houseData) totalVillageLoad += houseData[i].power;

                        updateGlobalStats();
                        if (document.getElementById('villageView').style.display === 'block') { 
                            updateVillageCards(); 
                        }
                        
                        // Pulse the global status indicator
                        const indicator = document.getElementById('statusIndicator');
                        indicator.classList.add('pulse-animation');
                        setTimeout(() => indicator.classList.remove('pulse-animation'), 500);
                    }
                });
            }
        }

       window.addEventListener('DOMContentLoaded', () => {
            initializeCharts();
            startListeners();
            updateGlobalStats();

            // --- THE NEW SMOOTH GRAPHING LOOP ---
            setInterval(() => {
                // 1. Get the current time (HH:MM:SS)
                const now = new Date();
                const timeString = now.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

                // 2. Push the new time to the X-Axis
                loadChart.data.labels.push(timeString);
                loadChart.data.labels.shift();

                // 3. Push the current total load to the Y-Axis
                loadChart.data.datasets[0].data.push(totalVillageLoad);
                loadChart.data.datasets[0].data.shift();

                // 4. Update the chart smoothly
                loadChart.update('none');
            }, 2000); // Updates every 2 seconds
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@500;700&display=swap');
        :root { --bg: #0a0e17; --glass: rgba(20, 25, 34, 0.8); --cyan: #00ffff; --green: #00ff88; --text: #ffffff; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .app-container { max-width: 500px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--cyan); letter-spacing: 2px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--glass); border: 1px solid rgba(0,255,255,0.2); padding: 20px; border-radius: 15px; text-align: center; }
        .stat-label { font-size: 12px; color: #8892b0; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--green); }
        .wide { grid-column: span 2; cursor: pointer; border-color: var(--green); }
        .chart-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; height: 250px; }
        
        /* Village Cards */
        .village-cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .village-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; transition: all 0.3s; }
        .village-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .village-card-id { font-weight: 700; color: var(--cyan); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .village-card-status { font-size: 10px; font-weight: 700; }
        .village-metric-label { font-size: 10px; color: #8892b0; }
        .village-metric-value { font-family: 'Orbitron', sans-serif; font-size: 16px; margin-bottom: 5px; }
        .forecast { color: var(--cyan); }
        .unit { font-size: 10px; font-family: 'Rajdhani'; }
        .slab-badge { font-size: 11px; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 5px; margin-top: 5px; }
        
        .back-button { background: none; border: 1px solid var(--cyan); color: var(--cyan); padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .status-indicator { width: 10px; height: 10px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 10px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        .pulse-animation { animation: pulse 0.5s ease-in-out; }
    </style>
</head>
<body>
    <div id="dashboardView" class="app-container">
        <header>
            <h1><span id="statusIndicator" class="status-indicator"></span>MICROGRID GATEWAY</h1>
        </header>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Active Meters</div><div class="stat-value" id="activeMetersValue">0</div></div>
            <div class="stat-card"><div class="stat-label">Avg Forecast</div><div class="stat-value" id="avgForecastValue">0</div><span class="unit">kWh</span></div>
            <div class="stat-card wide" onclick="showVillageView()">
                <div class="stat-label">Live Village Load</div>
                <div class="stat-value" id="totalLoadValue">0</div><span class="unit">WATTS</span>
            </div>
        </div>
        <div class="chart-card">
            <div class="stat-label">Grid Load Trend</div>
            <canvas id="villageLoadChart"></canvas>
        </div>
    </div>

    <div id="villageView" class="app-container" style="display: none;">
        <button class="back-button" onclick="showDashboardView()">← DASHBOARD</button>
        <div id="villageCardsContainer" class="village-cards-grid"></div>
    </div>
</body>
</html>
