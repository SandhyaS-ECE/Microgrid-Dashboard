<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <title>Microgrid Monitor</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD2nhMhyfPMiVPNWUJ8OkJJIKpg_6Hbyj8",
            authDomain: "solaris-4ca9a.firebaseapp.com",
            databaseURL: "https://solaris-4ca9a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "solaris-4ca9a",
            storageBucket: "solaris-4ca9a.firebasestorage.app",
            messagingSenderId: "959617229391",
            appId: "1:959617229391:web:581117f72c0a40b48cc03a"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const BUFFER_SIZE = 30;  
        
        const plantBuffers = {
            timestamps: [],        
            solarPower: [],        
            solarTemp: [],         
            loadPower: [],         
            batterySOC: [],        
            batteryTemp: []        
        };
        
        const currentPlantData = {
            solarPower: 0,
            solarTemp: 0,
            loadPower: 0,
            batterySOC: 0,
            batteryTemp: 0,
            timestamp: 0
        };
        
        const houseData = {};
        for (let id = 101; id <= 110; id++) {
            houseData[id] = { usage_kwh: 0, timestamp: 0 };
        }
        
        window.showDashboardView = () => {
            document.getElementById('dashboardView').style.display = 'block';
            document.getElementById('villageView').style.display = 'none';
        };
        
        window.showVillageView = () => {
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('villageView').style.display = 'block';
            updateVillageCards(); 
        };
        
        function addToBuffer(buffer, value) {
            buffer.push(value);
            if (buffer.length > BUFFER_SIZE) buffer.shift();  
        }
        
        function formatTimestamp(epochMs) {
            const date = new Date(epochMs);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        }
        
        let physicsChart = null;
        let balanceChart = null;
        
        function initializeCharts() {
            const physicsCtx = document.getElementById('physicsChart').getContext('2d');
            physicsChart = new Chart(physicsCtx, {
                type: 'line',
                data: { labels: plantBuffers.timestamps, datasets: [
                    { label: 'Solar Power (W)', data: plantBuffers.solarPower, borderColor: '#00ff88', backgroundColor: 'rgba(0, 255, 136, 0.15)', borderWidth: 2.5, fill: true, tension: 0.4, yAxisID: 'y-power', pointRadius: 0 },
                    { label: 'Panel Temp (°C)', data: plantBuffers.solarTemp, borderColor: '#ff6b35', backgroundColor: 'transparent', borderWidth: 2.5, borderDash: [6, 4], fill: false, tension: 0.4, yAxisID: 'y-temp', pointRadius: 0 }
                ]},
                options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { grid: { color: 'rgba(0, 255, 255, 0.08)' }, ticks: { color: '#00ffff' } },
                        'y-power': { type: 'linear', position: 'left', title: { display: true, text: 'Power (W)', color: '#00ff88' }, grid: { color: 'rgba(0, 255, 136, 0.08)' }, ticks: { color: '#00ff88' } },
                        'y-temp': { type: 'linear', position: 'right', title: { display: true, text: 'Temp (°C)', color: '#ff6b35' }, grid: { drawOnChartArea: false }, ticks: { color: '#ff6b35' } }
                    },
                    animation: { duration: 0 } 
                }
            });
            
            const balanceCtx = document.getElementById('balanceChart').getContext('2d');
            balanceChart = new Chart(balanceCtx, {
                type: 'line',
                data: { labels: plantBuffers.timestamps, datasets: [
                    { label: 'Solar Generation (W)', data: plantBuffers.solarPower, borderColor: '#00ff88', backgroundColor: 'rgba(0, 255, 136, 0.2)', borderWidth: 3, fill: true, tension: 0.4, pointRadius: 0 },
                    { label: 'Total Load (W)', data: plantBuffers.loadPower, borderColor: '#ff3860', backgroundColor: 'rgba(255, 56, 96, 0.2)', borderWidth: 3, fill: true, tension: 0.4, pointRadius: 0 }
                ]},
                options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { grid: { color: 'rgba(0, 255, 255, 0.08)' }, ticks: { color: '#00ffff' } },
                        y: { title: { display: true, text: 'Power (W)', color: '#00ffff' }, grid: { color: 'rgba(0, 255, 255, 0.08)' }, ticks: { color: '#00ffff' } }
                    },
                    animation: { duration: 0 }
                }
            });
        }
        
        function updateDashboardUI() {
            document.getElementById('solarPowerValue').textContent = currentPlantData.solarPower.toFixed(0);
            document.getElementById('batterySOCValue').textContent = currentPlantData.batterySOC.toFixed(1);
            
            const socBar = document.getElementById('socProgressBar');
            socBar.style.width = `${currentPlantData.batterySOC}%`;
            
            if (currentPlantData.batterySOC > 80) socBar.style.background = 'linear-gradient(90deg, #00ff88, #00cc6f)';
            else if (currentPlantData.batterySOC > 50) socBar.style.background = 'linear-gradient(90deg, #ffd700, #ffb700)';
            else if (currentPlantData.batterySOC > 20) socBar.style.background = 'linear-gradient(90deg, #ff9500, #ff7700)';
            else socBar.style.background = 'linear-gradient(90deg, #ff3860, #cc2a4d)';
            
            const tempElement = document.getElementById('batteryTempValue');
            tempElement.textContent = currentPlantData.batteryTemp.toFixed(1);
            if (currentPlantData.batteryTemp < 45) tempElement.style.color = '#00ff88';
            else if (currentPlantData.batteryTemp < 55) tempElement.style.color = '#ffd700';
            else tempElement.style.color = '#ff3860';
            
            // FIX: Uses actual live Watts sent from the Main Plant
            document.getElementById('loadPowerValue').textContent = currentPlantData.loadPower.toFixed(0);
            
            if (currentPlantData.timestamp > 0) {
                const diff = Math.floor((Date.now() - currentPlantData.timestamp) / 1000);
                document.getElementById('lastUpdate').textContent = diff < 60 ? `${diff}s ago` : `${Math.floor(diff / 60)}m ago`;
            }
        }
        
        function updateCharts() {
            if (physicsChart) physicsChart.update('none');
            if (balanceChart) balanceChart.update('none');
        }

        function initializeVillageCards() {
            const container = document.getElementById('villageCardsContainer');
            container.innerHTML = '';  
            
            for (let id = 101; id <= 110; id++) {
                const card = document.createElement('div');
                card.className = 'village-card';
                // FIX: Removed Voltage from the HTML layout
                card.innerHTML = `
                    <div class="village-card-header">
                        <div class="village-card-id">House ${id}</div>
                        <div class="village-card-status" id="status-color-${id}">
                            <span class="status-dot" id="status-dot-${id}"></span>
                            <span id="status-text-${id}">NORMAL</span>
                        </div>
                    </div>
                    <div class="village-card-body">
                        <div class="village-metric">
                            <div class="village-metric-label">Energy Billed</div>
                            <div class="village-metric-value">
                                <span id="load-${id}">0.0</span> <span class="village-metric-unit">kWh</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }
        
        function updateVillageCards() {
            for (let id = 101; id <= 110; id++) {
                const house = houseData[id];
                const isHigh = house.usage_kwh >= 50;
                const color = isHigh ? '#ff3860' : '#00ff88';
                const text = isHigh ? 'HIGH TARIFF' : 'NORMAL';
                
                document.getElementById(`load-${id}`).textContent = house.usage_kwh.toFixed(1);
                document.getElementById(`status-color-${id}`).style.color = color;
                document.getElementById(`status-dot-${id}`).style.background = color;
                document.getElementById(`status-text-${id}`).textContent = text;
            }
        }
        
        function startPlantListener() {
            const plantRef = ref(database, '/microgrid/plant');
            onValue(plantRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    currentPlantData.solarPower = data.solar_power || 0;
                    currentPlantData.solarTemp = data.solar_temp || 0;
                    currentPlantData.loadPower = data.load_power || 0;
                    currentPlantData.batterySOC = data.battery_soc || 0;
                    currentPlantData.batteryTemp = data.battery_temp || 0;
                    currentPlantData.timestamp = data.timestamp || Date.now();
                    
                    const timeLabel = formatTimestamp(currentPlantData.timestamp);
                    addToBuffer(plantBuffers.timestamps, timeLabel);
                    addToBuffer(plantBuffers.solarPower, currentPlantData.solarPower);
                    addToBuffer(plantBuffers.solarTemp, currentPlantData.solarTemp);
                    addToBuffer(plantBuffers.loadPower, currentPlantData.loadPower);
                    addToBuffer(plantBuffers.batterySOC, currentPlantData.batterySOC);
                    addToBuffer(plantBuffers.batteryTemp, currentPlantData.batteryTemp);
                    
                    updateDashboardUI();
                    updateCharts();
                    
                    const statusDot = document.getElementById('statusIndicator');
                    statusDot.classList.add('pulse-animation');
                    setTimeout(() => statusDot.classList.remove('pulse-animation'), 1000);
                }
            });
        }
        
        function startHouseListeners() {
            for (let id = 101; id <= 110; id++) {
                const houseRef = ref(database, `/microgrid/house_${id}`);
                onValue(houseRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        houseData[id].usage_kwh = data.usage_kwh || 0;
                        houseData[id].timestamp = data.timestamp || Date.now();
                        
                        if (document.getElementById('villageView').style.display === 'block') {
                            updateVillageCards();
                        }
                    }
                });
            }
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            initializeVillageCards(); 
            showDashboardView();
            initializeCharts();
            startPlantListener();
            startHouseListeners();
            updateDashboardUI();
            
            document.getElementById('connectionStatus').textContent = 'LIVE';
            document.getElementById('connectionStatus').style.color = '#00ff88';
        });
        
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-primary: #0a0e17; --bg-secondary: #141922; --bg-card: rgba(20, 25, 34, 0.85);
            --accent-cyan: #00ffff; --accent-green: #00ff88; --accent-red: #ff3860;
            --accent-orange: #ff6b35; --accent-yellow: #ffd700; --text-primary: #ffffff;
            --text-secondary: #8892b0; --glass-bg: rgba(20, 25, 34, 0.7);
            --glass-border: rgba(0, 255, 255, 0.2); --glass-shadow: 0 8px 32px 0 rgba(0, 255, 255, 0.15);
        }
        
        body { font-family: 'Rajdhani', sans-serif; background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; position: relative; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; animation: gridMove 20s linear infinite; }
        @keyframes gridMove { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }
        
        .app-container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }
        .header { text-align: center; margin-bottom: 24px; animation: fadeInDown 0.6s ease-out; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
        .logo-icon { font-size: 32px; animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 2px; text-transform: uppercase; }
        .status-bar { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--text-secondary); }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-indicator { width: 8px; height: 8px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 10px var(--accent-green); }
        .pulse-animation { animation: pulse 1s ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
        
        .card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: var(--glass-shadow); animation: fadeInUp 0.6s ease-out; transition: transform 0.3s ease; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-cyan); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; text-align: center; animation: fadeInUp 0.6s ease-out; }
        .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; color: var(--accent-green); line-height: 1; }
        .stat-unit { font-size: 14px; color: var(--text-secondary); margin-left: 4px; }
        
        .load-card { grid-column: span 2; cursor: pointer; position: relative; }
        .load-card::after { content: '→'; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 24px; color: var(--accent-cyan); opacity: 0.7; }
        .load-card:hover::after { opacity: 1; animation: slideRight 0.6s ease-in-out infinite; }
        @keyframes slideRight { 0%, 100% { transform: translateY(-50%) translateX(0); } 50% { transform: translateY(-50%) translateX(5px); } }
        
        .soc-progress-container { height: 8px; background: rgba(0, 255, 255, 0.1); border-radius: 4px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(0, 255, 255, 0.2); }
        .soc-progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent-green), #00cc6f); border-radius: 4px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .chart-card { margin-bottom: 20px; }
        .chart-container { position: relative; height: 260px; margin-top: 16px; }
        
        .village-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; animation: fadeInDown 0.6s ease-out; }
        .back-button { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--accent-cyan); padding: 10px 20px; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .village-title { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 1.5px; }
        
        .village-cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .village-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 14px; animation: fadeInUp 0.6s ease-out; }
        .village-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(0, 255, 255, 0.1); }
        .village-card-id { font-size: 13px; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 0.5px; }
        .village-card-status { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; transition: color 0.3s; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; transition: background 0.3s; }
        .village-card-body { display: flex; flex-direction: column; gap: 10px; }
        .village-metric { display: flex; justify-content: space-between; align-items: center; }
        .village-metric-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; }
        .village-metric-value { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent-green); transition: color 0.3s; }
        .village-metric-unit { font-size: 11px; color: var(--text-secondary); font-weight: 400; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 360px) {
            .app-container { padding: 16px 12px 40px; }
            h1 { font-size: 20px; }
            .stat-value { font-size: 24px; }
            .chart-container { height: 220px; }
            .village-cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="dashboardView" class="app-container">
        <header class="header">
            <div class="logo"><div class="logo-icon">⚡</div><h1>Microgrid Monitor</h1></div>
            <div class="status-bar">
                <div class="status-item"><div id="statusIndicator" class="status-indicator"></div><span id="connectionStatus">CONNECTING</span></div>
                <div class="status-item"><span>📡</span><span id="lastUpdate">—</span></div>
            </div>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">☀️ Solar</div><div class="stat-value"><span id="solarPowerValue">0</span><span class="stat-unit">W</span></div></div>
            <div class="stat-card"><div class="stat-label">🔋 SOC</div><div class="stat-value"><span id="batterySOCValue">0</span><span class="stat-unit">%</span></div><div class="soc-progress-container"><div id="socProgressBar" class="soc-progress-bar" style="width: 0%"></div></div></div>
            <div class="stat-card"><div class="stat-label">🌡️ Battery</div><div class="stat-value"><span id="batteryTempValue">0</span><span class="stat-unit">°C</span></div></div>
            <div class="stat-card load-card" onclick="showVillageView()"><div class="stat-label">⚡ Total Load</div><div class="stat-value"><span id="loadPowerValue">0</span><span class="stat-unit">W</span></div></div>
        </div>
        
        <div class="card chart-card"><div class="card-header"><div class="card-title">🔬 Physics Correlation</div></div><div class="chart-container"><canvas id="physicsChart"></canvas></div></div>
        <div class="card chart-card"><div class="card-header"><div class="card-title">⚖️ Grid Balance</div></div><div class="chart-container"><canvas id="balanceChart"></canvas></div></div>
    </div>
    
    <div id="villageView" class="app-container" style="display: none;">
        <div class="village-header"><button class="back-button" onclick="showDashboardView()">← Back</button><div class="village-title">Village Status</div></div>
        <div id="villageCardsContainer" class="village-cards-grid"></div>
    </div>
</body>
</html>
